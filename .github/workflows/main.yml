name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Python Linter
      run: |
        flake8 server/djangoapp server/djangoproj \
          --exclude=djangoenv,__pycache__,migrations,frontend,node_modules \
          --max-line-length=127 \
          --ignore=E722,W503
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 14

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run JavaScript Linter
      run: |
        echo '{"esversion": 8, "node": true, "undef": false, "unused": false}' > .jshintrc
        find ./server/database -name "*.js" -exec jshint --config .jshintrc {} +
        echo "Linted all the js files successfully"
